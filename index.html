    // ── Find & Replace ────────────────────────────────────────────────────
    let findMatches = [];
    let currentMatchIndex = -1;
    const MATCH_CLASS = '__find-match';
    const CURRENT_MATCH_CLASS = '__current-match';

    function openFindReplace() {
        const panel = document.getElementById('findReplacePanel');
        panel.classList.add('show');
        document.getElementById('findInput').focus();

        // Inject highlight styles into preview
        const doc = preview.contentDocument;
        if (!doc.getElementById('__find-style')) {
            const style = doc.createElement('style');
            style.id = '__find-style';
            style.textContent = `
                .__find-match {
                    background-color: #fef08a !important;
                    border-bottom: 2px solid #eab308;
                }
                .__current-match {
                    background-color: #fbbf24 !important;
                    border-bottom: 2px solid #f59e0b;
                }
            `;
            doc.head.appendChild(style);
        }
    }

    function closeFindReplace() {
        const panel = document.getElementById('findReplacePanel');
        panel.classList.remove('show');
        clearMatches();
    }

    function handleFindInput(e) {
        if (e.key === 'Enter') {
            if (e.shiftKey) {
                findPrevious();
            } else {
                findNext();
            }
            return;
        }

        // Clear previous matches and search
        clearMatches();
        const query = document.getElementById('findInput').value;
        if (query) {
            performFind(query);
        }
    }

    function performFind(query) {
        const doc = preview.contentDocument;
        if (!doc || !doc.body) return;

        const caseSensitive = document.getElementById('caseSensitive').checked;
        const searchText = caseSensitive ? query : query.toLowerCase();

        // Walk through all text nodes
        const walker = doc.createTreeWalker(
            doc.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );

        const matches = [];
        let node;

        while (node = walker.nextNode()) {
            const nodeText = caseSensitive ? node.nodeValue : node.nodeValue.toLowerCase();
            let index = 0;

            while ((index = nodeText.indexOf(searchText, index)) !== -1) {
                matches.push({ node, index, length: query.length });
                index += query.length;
            }
        }

        // Highlight all matches
        findMatches = [];
        matches.forEach(match => {
            const { node, index, length } = match;
            const range = doc.createRange();
            range.setStart(node, index);
            range.setEnd(node, index + length);

            const span = doc.createElement('span');
            span.className = MATCH_CLASS;
            try {
                range.surroundContents(span);
                findMatches.push(span);
            } catch (e) {
                // Skip if range can't be surrounded
            }
        });

        // Update info
        const info = document.getElementById('searchInfo');
        if (findMatches.length > 0) {
            currentMatchIndex = 0;
            highlightCurrentMatch();
            info.textContent = `Found ${findMatches.length} match${findMatches.length !== 1 ? 'es' : ''}`;
        } else {
            info.textContent = query ? 'No matches found' : '';
            currentMatchIndex = -1;
        }
    }

    function clearMatches() {
        const doc = preview.contentDocument;
        if (!doc) return;

        // Remove all highlight spans
        doc.querySelectorAll(`.${MATCH_CLASS}`).forEach(span => {
            const parent = span.parentNode;
            while (span.firstChild) {
                parent.insertBefore(span.firstChild, span);
            }
            parent.removeChild(span);
            parent.normalize(); // Merge adjacent text nodes
        });

        findMatches = [];
        currentMatchIndex = -1;
        document.getElementById('searchInfo').textContent = '';
    }

    function highlightCurrentMatch() {
        if (currentMatchIndex < 0 || currentMatchIndex >= findMatches.length) return;

        // Remove current highlight from all
        findMatches.forEach(span => {
            span.classList.remove(CURRENT_MATCH_CLASS);
        });

        // Highlight current
        const current = findMatches[currentMatchIndex];
        current.classList.add(CURRENT_MATCH_CLASS);

        // Scroll into view
        current.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Update info
        document.getElementById('searchInfo').textContent =
            `Match ${currentMatchIndex + 1} of ${findMatches.length}`;
    }

    function findNext() {
        if (findMatches.length === 0) {
            const query = document.getElementById('findInput').value;
            if (query) performFind(query);
            return;
        }

        currentMatchIndex = (currentMatchIndex + 1) % findMatches.length;
        highlightCurrentMatch();
    }

    function findPrevious() {
        if (findMatches.length === 0) {
            const query = document.getElementById('findInput').value;
            if (query) performFind(query);
            return;
        }

        currentMatchIndex = currentMatchIndex - 1;
        if (currentMatchIndex < 0) currentMatchIndex = findMatches.length - 1;
        highlightCurrentMatch();
    }

    function replaceOne() {
        if (currentMatchIndex < 0 || currentMatchIndex >= findMatches.length) return;

        const replaceText = document.getElementById('replaceInput').value;
        const current = findMatches[currentMatchIndex];

        // Replace the text
        current.textContent = replaceText;

        // Remove the span wrapper
        const parent = current.parentNode;
        while (current.firstChild) {
            parent.insertBefore(current.firstChild, current);
        }
        parent.removeChild(current);
        parent.normalize();

        // Remove from matches array
        findMatches.splice(currentMatchIndex, 1);

        // Update display
        if (findMatches.length > 0) {
            if (currentMatchIndex >= findMatches.length) {
                currentMatchIndex = findMatches.length - 1;
            }
            highlightCurrentMatch();
        } else {
            document.getElementById('searchInfo').textContent = 'No more matches';
            currentMatchIndex = -1;
        }

        // Sync changes
        onPreviewEdit();
    }

    function replaceAll() {
        if (findMatches.length === 0) return;

        const replaceText = document.getElementById('replaceInput').value;
        const count = findMatches.length;

        // Replace all matches
        findMatches.forEach(span => {
            span.textContent = replaceText;
            const parent = span.parentNode;
            while (span.firstChild) {
                parent.insertBefore(span.firstChild, span);
            }
            parent.removeChild(span);
            parent.normalize();
        });

        // Clear matches
        findMatches = [];
        currentMatchIndex = -1;
        document.getElementById('searchInfo').textContent = `Replaced ${count} match${count !== 1 ? 'es' : ''}`;

        // Sync changes
        onPreviewEdit();

        showToast(`✓ Replaced ${count} match${count !== 1 ? 'es' : ''}`, 'success');
    }

    // ══════════════════════════════════════════════════════════════════════
    //  1.  TOGGLE SOURCE PANE
    // ══════════════════════════════════════════════════════════════════════

    function toggleSource() {
        sourceHidden = !sourceHidden;
        container.classList.toggle('source-hidden', sourceHidden);
        const btn = document.getElementById('btnToggleSource');
        btn.innerHTML = sourceHidden ? '&#9654; Show Source' : '&#9664; Hide Source';
    }

    // ══════════════════════════════════════════════════════════════════════
    //  2.  TABLE EDITING
    // ══════════════════════════════════════════════════════════════════════

    let selectedCells  = [];
    let activeTable    = null;
    let lastClickedCell = null;

    // ── Detect table context ─────────────────────────────────────────────

    function detectTableContext() {
        const doc = preview.contentDocument;
        const sel = doc.getSelection();
        let el = sel && sel.anchorNode;
        if (!el) return;
        if (el.nodeType === 3) el = el.parentElement;
        if (!el) return;

        const cell  = el.closest ? el.closest('td, th') : null;
        const table = cell ? cell.closest('table') : null;

        if (table) {
            activeTable = table;
            document.getElementById('tableToolbar').style.display = 'flex';
            if (cell) updateCellInputs(cell);
        } else {
            activeTable = null;
            document.getElementById('tableToolbar').style.display = 'none';
        }
    }

    // ── Preview click: cell selection + format painter ───────────────────

    function onPreviewClick(e) {
        // Format painter application is handled on mouseup instead
        const cell = e.target.closest ? e.target.closest('td, th') : null;
        const table = cell ? cell.closest('table') : null;

        if (table) {
            activeTable = table;
            document.getElementById('tableToolbar').style.display = 'flex';
            setTimeout(() => attachTableResizeHandles(), 0);
        }

        if (cell) {
            handleCellClick(cell, e);
            // Show cell toolbar only if no text is selected; text toolbar is handled by selectionchange
            setTimeout(() => {
                const sel = preview.contentDocument.getSelection();
                if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
                    showFloatingToolbar('cell');
                }
            }, 50);
        } else {
            clearCellSelection();
        }
    }

    function handleCellClick(cell, e) {
        if (e.ctrlKey || e.metaKey) {
            // Toggle this cell
            const idx = selectedCells.indexOf(cell);
            if (idx >= 0) {
                selectedCells.splice(idx, 1);
                cell.classList.remove('__csel');
            } else {
                selectedCells.push(cell);
                cell.classList.add('__csel');
            }
        } else if (e.shiftKey && lastClickedCell && cell.parentElement === lastClickedCell.parentElement) {
            // Range select within same row
            const row   = cell.parentElement;
            const start = Math.min(cell.cellIndex, lastClickedCell.cellIndex);
            const end   = Math.max(cell.cellIndex, lastClickedCell.cellIndex);
            clearCellSelection();
            for (let i = start; i <= end; i++) {
                if (row.cells[i]) {
                    selectedCells.push(row.cells[i]);
                    row.cells[i].classList.add('__csel');
                }
            }
        } else if (e.shiftKey && lastClickedCell) {
            // Range select across rows (rectangular)
            const table = cell.closest('table');
            if (table && lastClickedCell.closest('table') === table) {
                const r1 = Math.min(cell.parentElement.rowIndex, lastClickedCell.parentElement.rowIndex);
                const r2 = Math.max(cell.parentElement.rowIndex, lastClickedCell.parentElement.rowIndex);
                const c1 = Math.min(cell.cellIndex, lastClickedCell.cellIndex);
                const c2 = Math.max(cell.cellIndex, lastClickedCell.cellIndex);
                clearCellSelection();
                for (let r = r1; r <= r2; r++) {
                    const row = table.rows[r];
                    if (!row) continue;
                    for (let c = c1; c <= c2; c++) {
                        if (row.cells[c]) {
                            selectedCells.push(row.cells[c]);
                            row.cells[c].classList.add('__csel');
                        }
                    }
                }
            }
        } else {
            // Single cell select
            clearCellSelection();
            selectedCells.push(cell);
            cell.classList.add('__csel');
        }

        lastClickedCell = cell;
        document.getElementById('cellSelCount').textContent = selectedCells.length;
        if (selectedCells.length > 0) updateCellInputs(selectedCells[0]);
    }

    function clearCellSelection() {
        const hadCells = selectedCells.length > 0;
        selectedCells.forEach(c => { if (c.isConnected) c.classList.remove('__csel'); });
        selectedCells = [];
        lastClickedCell = null;
        document.getElementById('cellSelCount').textContent = '0';
        // Only hide floating toolbar if we were in cell mode
        if (hadCells) hideFloatingToolbar();
    }

    function selectAllCells() {
        if (!activeTable) return;
        clearCellSelection();
        activeTable.querySelectorAll('td, th').forEach(c => {
            selectedCells.push(c);
            c.classList.add('__csel');
        });
        document.getElementById('cellSelCount').textContent = selectedCells.length;
    }

    function updateCellInputs(cell) {
        document.getElementById('tblCellW').value   = parseInt(cell.style.width)   || '';
        document.getElementById('tblCellH').value   = parseInt(cell.style.height)  || '';
        document.getElementById('tblCellPad').value  = parseInt(cell.style.padding) || '';
        const bg = cell.style.backgroundColor;
        document.getElementById('tblCellColor').value = bg ? rgbToHex(bg) : '#ffffff';
        updateWrapButton(cell.style.whiteSpace !== 'nowrap');
    }

    // ── Row / Column operations ──────────────────────────────────────────

    function getActiveCell() {
        if (selectedCells.length > 0) return selectedCells[0];
        const doc = preview.contentDocument;
        const sel = doc.getSelection();
        let el = sel && sel.anchorNode;
        if (el && el.nodeType === 3) el = el.parentElement;
        return el ? (el.closest ? el.closest('td, th') : null) : null;
    }

    function addRow(pos) {
        const cell = getActiveCell();
        if (!cell) return;
        const row = cell.parentElement;
        const table = row.closest('table');
        const numCols = row.cells.length;
        const newRow = table.insertRow(pos === 'above' ? row.rowIndex : row.rowIndex + 1);
        for (let i = 0; i < numCols; i++) {
            const td = newRow.insertCell();
            td.innerHTML = '&nbsp;';
            td.style.cssText = row.cells[0] ? row.cells[0].style.cssText.replace(/background[^;]*;?/gi, '') : 'padding:8px 10px;border:1px solid #d1d5db';
        }
        onPreviewEdit();
    }

    function deleteRow() {
        const cell = getActiveCell();
        if (!cell) return;
        const row = cell.parentElement;
        const table = row.closest('table');
        if (table.rows.length <= 1) { alert('Cannot delete the last row.'); return; }
        clearCellSelection();
        row.remove();
        onPreviewEdit();
        detectTableContext();
    }

    function addCol(pos) {
        const cell = getActiveCell();
        if (!cell) return;
        const table = cell.closest('table');
        const colIdx = cell.cellIndex;
        const insertIdx = pos === 'left' ? colIdx : colIdx + 1;
        for (let r = 0; r < table.rows.length; r++) {
            const row = table.rows[r];
            const td  = row.insertCell(Math.min(insertIdx, row.cells.length));
            td.innerHTML = '&nbsp;';
            const isHeader = row.parentElement.tagName === 'THEAD';
            if (isHeader) {
                // Convert td to th
                const th = preview.contentDocument.createElement('th');
                th.innerHTML = td.innerHTML;
                th.style.cssText = 'background:#f3f4f6;padding:8px 10px;border:1px solid #d1d5db;text-align:left';
                row.replaceChild(th, td);
            } else {
                td.style.cssText = 'padding:8px 10px;border:1px solid #d1d5db';
            }
        }
        onPreviewEdit();
    }

    function deleteCol() {
        const cell = getActiveCell();
        if (!cell) return;
        const table = cell.closest('table');
        const colIdx = cell.cellIndex;
        if (table.rows[0] && table.rows[0].cells.length <= 1) { alert('Cannot delete the last column.'); return; }
        clearCellSelection();
        for (let r = table.rows.length - 1; r >= 0; r--) {
            if (table.rows[r].cells[colIdx]) table.rows[r].deleteCell(colIdx);
        }
        onPreviewEdit();
        detectTableContext();
    }

    // ── Merge / Split ────────────────────────────────────────────────────

    function mergeCells() {
        if (selectedCells.length < 2) { alert('Select 2+ cells (Ctrl/Cmd+Click or Shift+Click) to merge.'); return; }

        // Check if all cells belong to same table
        const table = selectedCells[0].closest('table');
        if (!selectedCells.every(c => c.closest('table') === table)) { alert('All cells must be in the same table.'); return; }

        // Determine bounding rectangle
        let minR = Infinity, maxR = -1, minC = Infinity, maxC = -1;
        selectedCells.forEach(c => {
            const r = c.parentElement.rowIndex;
            const ci = c.cellIndex;
            if (r < minR) minR = r;
            if (r > maxR) maxR = r;
            if (ci < minC) minC = ci;
            if (ci > maxC) maxC = ci;
        });

        const rowSpan = maxR - minR + 1;
        const colSpan = maxC - minC + 1;

        // Collect content from all cells & remove non-anchor cells
        const anchor = table.rows[minR].cells[minC];
        let content = '';
        for (let r = minR; r <= maxR; r++) {
            const row = table.rows[r];
            if (!row) continue;
            for (let c = maxC; c >= minC; c--) {
                const td = row.cells[c];
                if (!td) continue;
                if (td !== anchor) {
                    if (td.textContent.trim()) content = td.textContent.trim() + ' ' + content;
                    td.remove();
                }
            }
        }
        if (content.trim()) anchor.innerHTML += ' ' + content.trim();
        anchor.colSpan = colSpan;
        anchor.rowSpan = rowSpan;

        clearCellSelection();
        selectedCells.push(anchor);
        anchor.classList.add('__csel');
        document.getElementById('cellSelCount').textContent = '1';
        onPreviewEdit();
    }

    function splitCell() {
        const cell = selectedCells.length === 1 ? selectedCells[0] : getActiveCell();
        if (!cell) { alert('Select a merged cell to split.'); return; }

        const cs = cell.colSpan || 1;
        const rs = cell.rowSpan || 1;
        if (cs <= 1 && rs <= 1) { alert('This cell is not merged.'); return; }

        const table = cell.closest('table');
        const rowIdx = cell.parentElement.rowIndex;
        const colIdx = cell.cellIndex;
        const baseStyle = cell.style.cssText.replace(/width[^;]*;?/gi, '');

        // Expand columns in the anchor row
        cell.colSpan = 1;
        cell.rowSpan = 1;
        const row = cell.parentElement;
        for (let c = 1; c < cs; c++) {
            const td = preview.contentDocument.createElement(cell.tagName);
            td.innerHTML = '&nbsp;';
            td.style.cssText = baseStyle;
            if (cell.nextSibling) row.insertBefore(td, cell.nextSibling);
            else row.appendChild(td);
        }

        // Expand spanned rows
        for (let r = 1; r < rs; r++) {
            const targetRow = table.rows[rowIdx + r];
            if (!targetRow) continue;
            for (let c = 0; c < cs; c++) {
                const td = preview.contentDocument.createElement(cell.tagName);
                td.innerHTML = '&nbsp;';
                td.style.cssText = baseStyle;
                if (targetRow.cells[colIdx]) targetRow.insertBefore(td, targetRow.cells[colIdx]);
                else targetRow.appendChild(td);
            }
        }

        clearCellSelection();
        onPreviewEdit();
    }

    // ── Cell property setters ────────────────────────────────────────────

    function setCellProp(prop, value) {
        const cells = selectedCells.length ? selectedCells : [getActiveCell()].filter(Boolean);
        cells.forEach(c => c.style[prop] = value);
        if (cells.length) onPreviewEdit();
    }

    function setCellColor(color) {
        const cells = selectedCells.length ? selectedCells : [getActiveCell()].filter(Boolean);
        cells.forEach(c => c.style.backgroundColor = color);
        if (cells.length) onPreviewEdit();
    }

    function toggleCellWrap() {
        const cells = selectedCells.length ? selectedCells : [getActiveCell()].filter(Boolean);
        if (!cells.length) return;
        const current = cells[0].style.whiteSpace;
        const wrap = (current === 'nowrap') ? 'normal' : 'nowrap';
        cells.forEach(c => {
            c.style.whiteSpace = wrap;
            c.style.wordWrap = (wrap === 'normal') ? 'break-word' : '';
            c.style.overflowWrap = (wrap === 'normal') ? 'break-word' : '';

            // Table needs fixed layout for wrapping to work
            const table = c.closest('table');
            if (table && wrap === 'normal') {
                table.style.tableLayout = 'fixed';
                // Cells need explicit widths under fixed layout
                if (!c.style.width) {
                    const computedWidth = c.getBoundingClientRect().width;
                    c.style.width = Math.round(computedWidth) + 'px';
                }
            }
        });
        updateWrapButton(wrap !== 'nowrap');
        onPreviewEdit();
    }

    function updateWrapButton(isWrapping) {
        const btn = document.getElementById('btnWrapText');
        if (btn) btn.classList.toggle('active', isWrapping);
    }

    function rgbToHex(rgb) {
        if (!rgb || rgb === 'transparent') return '#ffffff';
        if (rgb.startsWith('#')) return rgb;
        const parts = rgb.match(/\d+/g);
        if (!parts || parts.length < 3) return '#ffffff';
        return '#' + parts.slice(0, 3).map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
    }

    function indentTable(dir) {
        if (!activeTable) return;
        const current = parseInt(activeTable.style.marginLeft) || 0;
        const step = 20;
        const newMargin = Math.max(0, current + dir * step);
        activeTable.style.marginLeft = newMargin ? newMargin + 'px' : '';
        onPreviewEdit();
    }

    function applyBorder(side) {
        const cells = selectedCells.length ? selectedCells : [getActiveCell()].filter(Boolean);
        if (!cells.length) return;

        const w = document.getElementById('tblBorderW').value + 'px';
        const s = document.getElementById('tblBorderS').value;
        const c = document.getElementById('tblBorderC').value;
        const val = `${w} ${s} ${c}`;

        cells.forEach(cell => {
            if (side === 'all') {
                cell.style.border = val;
            } else if (side === 'none') {
                cell.style.border = 'none';
            } else {
                cell.style['border' + side] = val;
            }
        });
        onPreviewEdit();
    }

    // ── Column resize by dragging borders ─────────────────────────────────

    function attachTableResizeHandles() {
        const doc = preview.contentDocument;
        if (!doc || !doc.body) return;

        // Remove existing handles
        doc.querySelectorAll('.__col-resize-handle').forEach(el => el.remove());

        doc.querySelectorAll('table').forEach(table => {
            // Need position context for absolute handles
            const tableStyle = table.style.position;
            if (!tableStyle || tableStyle === 'static') {
                table.style.position = 'relative';
            }

            const firstRow = table.rows[0];
            if (!firstRow) return;

            for (let i = 0; i < firstRow.cells.length - 1; i++) {
                const cell = firstRow.cells[i];
                const handle = doc.createElement('div');
                handle.className = '__col-resize-handle';

                // Position at right edge of this cell
                const cellRect = cell.getBoundingClientRect();
                const tableRect = table.getBoundingClientRect();

                handle.style.left = (cellRect.right - tableRect.left - 2.5) + 'px';
                handle.style.top = '0';
                handle.style.height = table.offsetHeight + 'px';

                handle.setAttribute('data-col', i);

                handle.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    initColumnResize(e, this, table);
                });

                table.appendChild(handle);
            }
        });
    }

    function initColumnResize(e, handle, table) {
        const doc = preview.contentDocument;
        const colIndex = parseInt(handle.getAttribute('data-col'));
        const startX = e.clientX;

        // Get current widths for all cells in affected columns
        const leftCells = [];
        const rightCells = [];
        for (let r = 0; r < table.rows.length; r++) {
            const row = table.rows[r];
            if (row.cells[colIndex]) leftCells.push(row.cells[colIndex]);
            if (row.cells[colIndex + 1]) rightCells.push(row.cells[colIndex + 1]);
        }

        const startLeftWidth = leftCells[0] ? leftCells[0].getBoundingClientRect().width : 100;
        const startRightWidth = rightCells[0] ? rightCells[0].getBoundingClientRect().width : 100;
        const minWidth = 30;

        // Lock UI during drag
        handle.classList.add('__active');
        doc.body.classList.add('__col-resize-active');
        doc.designMode = 'off';

        function onMouseMove(ev) {
            const deltaX = ev.clientX - startX;

            let newLeft = startLeftWidth + deltaX;
            if (newLeft < minWidth) newLeft = minWidth;

            // Only resize the dragged column — table width adjusts naturally
            leftCells.forEach(c => c.style.width = newLeft + 'px');

            // Remove width:100% from table if present so it can shrink
            if (table.style.width === '100%') table.style.width = '';

            // Reposition handle
            const cellRect = leftCells[0].getBoundingClientRect();
            const tableRect = table.getBoundingClientRect();
            handle.style.left = (cellRect.right - tableRect.left - 2.5) + 'px';
        }

        function onMouseUp() {
            handle.classList.remove('__active');
            doc.body.classList.remove('__col-resize-active');
            doc.designMode = 'on';

            doc.removeEventListener('mousemove', onMouseMove);
            doc.removeEventListener('mouseup', onMouseUp);

            // Sync changes and reposition all handles
            onPreviewEdit();
            setTimeout(() => attachTableResizeHandles(), 0);

            // Update toolbar width input if cell is selected
            if (selectedCells.length > 0) {
                updateCellInputs(selectedCells[0]);
            }
        }

        doc.addEventListener('mousemove', onMouseMove);
        doc.addEventListener('mouseup', onMouseUp);
    }

    // ══════════════════════════════════════════════════════════════════════
    //  3.  FORMAT PAINTER
    // ══════════════════════════════════════════════════════════════════════

    let formatPainterActive = false;
    let copiedFormat = null;

    function toggleFormatPainter() {
        if (formatPainterActive) { deactivateFormatPainter(); return; }

        restoreSelection();
        copiedFormat = captureFormat();
        if (!copiedFormat) {
            alert('Place your cursor in styled text or click a table cell first, then press Format Painter.');
            return;
        }

        formatPainterActive = true;
        document.getElementById('btnFmtPainter').classList.add('active');
        const doc = preview.contentDocument;
        if (doc.body) doc.body.classList.add('__fmtptr');
    }

    function deactivateFormatPainter() {
        formatPainterActive = false;
        copiedFormat = null;
        document.getElementById('btnFmtPainter').classList.remove('active');
        const doc = preview.contentDocument;
        if (doc && doc.body) doc.body.classList.remove('__fmtptr');
    }

    function captureFormat() {
        const doc = preview.contentDocument;
        const sel = doc.getSelection();
        if (!sel || sel.rangeCount === 0) return null;

        let el = sel.anchorNode;
        if (!el) return null;
        if (el.nodeType === 3) el = el.parentElement;
        if (!el) return null;

        const cs = doc.defaultView.getComputedStyle(el);
        const fmt = {
            fontFamily: cs.fontFamily,
            fontSize: cs.fontSize,
            fontWeight: cs.fontWeight,
            fontStyle: cs.fontStyle,
            textDecorationLine: cs.textDecorationLine || cs.textDecoration || '',
            color: cs.color,
            backgroundColor: cs.backgroundColor,
        };

        // Cell-specific
        const cell = el.closest ? el.closest('td, th') : null;
        if (cell) {
            const cc = doc.defaultView.getComputedStyle(cell);
            fmt.isCell = true;
            fmt.cellPadding      = cc.padding;
            fmt.cellBorderTop    = cc.borderTop;
            fmt.cellBorderRight  = cc.borderRight;
            fmt.cellBorderBottom = cc.borderBottom;
            fmt.cellBorderLeft   = cc.borderLeft;
            fmt.cellTextAlign    = cc.textAlign;
            fmt.cellVerticalAlign = cc.verticalAlign;
            fmt.cellBgColor      = cc.backgroundColor;
        }

        return fmt;
    }

    function onPreviewMouseUp(e) {
        if (!formatPainterActive || !copiedFormat) return;

        const doc = preview.contentDocument;
        const sel = doc.getSelection();

        // Apply cell format if clicked on a cell
        const cell = e.target.closest ? e.target.closest('td, th') : null;
        if (cell && copiedFormat.isCell) {
            cell.style.padding        = copiedFormat.cellPadding;
            cell.style.borderTop      = copiedFormat.cellBorderTop;
            cell.style.borderRight    = copiedFormat.cellBorderRight;
            cell.style.borderBottom   = copiedFormat.cellBorderBottom;
            cell.style.borderLeft     = copiedFormat.cellBorderLeft;
            cell.style.textAlign      = copiedFormat.cellTextAlign;
            cell.style.verticalAlign  = copiedFormat.cellVerticalAlign;
            cell.style.backgroundColor = copiedFormat.cellBgColor;
        }

        // Apply text format to selection
        if (sel && !sel.isCollapsed) {
            applyTextFormat(copiedFormat);
        }

        deactivateFormatPainter();
        onPreviewEdit();
    }

    function applyTextFormat(fmt) {
        const doc = preview.contentDocument;

        // Color
        doc.execCommand('foreColor', false, fmt.color);

        // Font
        const family = fmt.fontFamily.split(',')[0].replace(/['"]/g, '').trim();
        doc.execCommand('fontName', false, family);

        // Highlight
        if (fmt.backgroundColor && fmt.backgroundColor !== 'rgba(0, 0, 0, 0)' && fmt.backgroundColor !== 'transparent') {
            doc.execCommand('hiliteColor', false, fmt.backgroundColor);
        }

        // Bold
        const isBold = doc.queryCommandState('bold');
        const wantBold = parseInt(fmt.fontWeight) >= 700 || fmt.fontWeight === 'bold';
        if (isBold !== wantBold) doc.execCommand('bold');

        // Italic
        const isItalic = doc.queryCommandState('italic');
        if (isItalic !== (fmt.fontStyle === 'italic')) doc.execCommand('italic');

        // Underline
        const isUL = doc.queryCommandState('underline');
        const wantUL = fmt.textDecorationLine.includes('underline');
        if (isUL !== wantUL) doc.execCommand('underline');

        // Strikethrough
        const isST = doc.queryCommandState('strikeThrough');
        const wantST = fmt.textDecorationLine.includes('line-through');
        if (isST !== wantST) doc.execCommand('strikeThrough');

        // Font size (map px → execCommand 1-7)
        const px = parseInt(fmt.fontSize);
        const sizeMap = [[10,'1'],[13,'2'],[16,'3'],[18,'4'],[24,'5'],[32,'6'],[9999,'7']];
        const sz = (sizeMap.find(([max]) => px <= max) || [0,'3'])[1];
        doc.execCommand('fontSize', false, sz);
    }

    // ══════════════════════════════════════════════════════════════════════
    //  COPY & TEMPLATES
    // ══════════════════════════════════════════════════════════════════════

    function copyCode() {
        navigator.clipboard.writeText(editor.value);
        alert('HTML copied to clipboard!');
    }

    function loadTemplate(type) {
        if (!type) return;
        const templates = {
            basic: `<!DOCTYPE html>
<html>
<head>
<title>Basic Page</title>
</head>
<body>
<h1>Hello World</h1>
<p>This is a simple template.</p>
</body>
</html>`,
            card: `<div style="max-width:300px;padding:20px;border:1px solid #ccc;border-radius:10px;">
<h2>Card Title</h2>
<p>This is a simple card layout.</p>
<button>Click Me</button>
</div>`,
            email: `<table width="100%" cellpadding="0" cellspacing="0">
<tr>
<td align="center">
<h1>Welcome!</h1>
<p>This is a simple email template.</p>
</td>
</tr>
</table>`
        };
        editor.value = templates[type];
        updatePreview();
    }

    // ── Init ─────────────────────────────────────────────────────────────

    const saved = localStorage.getItem('savedCode');
    editor.value = saved || '<h1>Start editing your HTML here</h1>';
    updatePreview();
</script>

</body>
</html>
